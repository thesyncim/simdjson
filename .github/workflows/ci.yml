name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            cross_arch: arm64
            primary: true
            fuzz_shard: 0
          - runner: ubuntu-24.04-arm
            cross_arch: amd64
            primary: false
            fuzz_shard: 1
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      # go.mod requires Go 1.27, which only exists as tip; keep the stable
      # bootstrap from trying to auto-download an unreleased toolchain.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip

      - name: Tests, pure Go
        run: $RUNNER_TEMP/gotip/bin/go test ./...

      - name: Tests, SIMD
        run: $RUNNER_TEMP/gotip/bin/go test ./...
        env:
          GOEXPERIMENT: simd

      - name: Tests, shuffled
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go test -shuffle=on ./...

      - name: Go stdlib high-level corpus
        run: ./scripts/check-stdlib-corpus.sh "$RUNNER_TEMP/gotip/bin/go"

      - name: Vet
        run: $RUNNER_TEMP/gotip/bin/go vet ./...

      - name: Install pinned analysis tools
        if: ${{ matrix.primary }}
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" $RUNNER_TEMP/gotip/bin/go install honnef.co/go/tools/cmd/staticcheck@v0.8.0-rc.1
          GOBIN="$RUNNER_TEMP/bin" $RUNNER_TEMP/gotip/bin/go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Static analysis
        if: ${{ matrix.primary }}
        run: >-
          PATH="$RUNNER_TEMP/gotip/bin:$PATH"
          "$RUNNER_TEMP/bin/staticcheck"
          '-checks=SA*' ./...

      - name: Vulnerability scan
        if: ${{ matrix.primary }}
        run: >-
          PATH="$RUNNER_TEMP/gotip/bin:$PATH"
          "$RUNNER_TEMP/bin/govulncheck" ./...

      - name: Generated files are clean
        if: ${{ matrix.primary }}
        run: |
          $RUNNER_TEMP/gotip/bin/go generate ./...
          git diff --exit-code

      - name: Unsafe inventory is complete
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go run ./internal/cmd/unsafeinventory -check UNSAFE.md

      - name: Module files are tidy
        if: ${{ matrix.primary }}
        run: |
          $RUNNER_TEMP/gotip/bin/go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Race, pure Go
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go test -race -timeout=20m -skip 'Alloc|ZeroCost|StaysOnStack|TestParseFloat64' ./...

      - name: Race, SIMD
        run: $RUNNER_TEMP/gotip/bin/go test -race -timeout=20m -skip 'Alloc|ZeroCost|StaysOnStack|TestParseFloat64' ./...
        env:
          GOEXPERIMENT: simd

      - name: Checkptr
        run: >-
          "$RUNNER_TEMP/gotip/bin/go" test
          -gcflags=all=-d=checkptr=2
          -skip 'Alloc|ZeroCost|StaysOnStack|TestParseFloat64' ./...
        env:
          GOEXPERIMENT: simd

      - name: Lifetime stress
        run: >-
          "$RUNNER_TEMP/gotip/bin/go" test
          -run '^Test(EncoderScratchPoolPoisoning|DynamicMapScratchIsPlanIndependent|EncodeHookArrayUsesStableSourcePointers|HookReceiverLifetimes|HookRetentionTrapAfterPanic)$'
          -count=10 -cpu=1,4,8 .
        env:
          GOGC: 1
          GOEXPERIMENT: simd

      - name: Cross-compile other Linux architecture
        run: $RUNNER_TEMP/gotip/bin/go build ./...
        env:
          GOOS: linux
          GOARCH: ${{ matrix.cross_arch }}
          GOEXPERIMENT: simd

      - name: Cross-compile 32-bit and big-endian targets
        if: ${{ matrix.primary }}
        run: |
          GOARCH=386 $RUNNER_TEMP/gotip/bin/go build ./...
          GOARCH=s390x $RUNNER_TEMP/gotip/bin/go build ./...

      - name: Fuzz smoke, all targets
        run: ./scripts/fuzz-smoke.sh "$RUNNER_TEMP/gotip/bin/go" 5s "${{ matrix.fuzz_shard }}" 2
        env:
          GOEXPERIMENT: simd
          GOFLAGS: -tags=simdjson_validate_hooks
          FUZZ_PARALLEL: 4

      - name: Scheduled fuzz, pure Go
        if: ${{ github.event_name == 'schedule' }}
        run: ./scripts/fuzz-smoke.sh "$RUNNER_TEMP/gotip/bin/go" 30s "${{ matrix.fuzz_shard }}" 2
        env:
          FUZZ_PARALLEL: 4

      - name: Upload fuzz crash corpus
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-${{ matrix.runner }}-${{ matrix.fuzz_shard }}
          path: '**/testdata/fuzz/**'
          if-no-files-found: ignore

      - name: Comparison module builds
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go test -run 'TestValidatorsAcceptFixtures' .
        working-directory: benchmarks

      - name: Stable comparison module builds
        if: ${{ matrix.primary }}
        run: go test ./...
        working-directory: benchmarks/legacy
