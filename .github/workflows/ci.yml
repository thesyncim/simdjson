name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            cross_arch: arm64
            primary: true
          - runner: ubuntu-24.04-arm
            cross_arch: amd64
            primary: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      # go.mod requires Go 1.27, which only exists as tip; keep the stable
      # bootstrap from trying to auto-download an unreleased toolchain.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - name: Install Go bootstrap
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.4
          cache: false

      - name: Build pinned Go tip
        run: ./scripts/bootstrap-gotip.sh "$RUNNER_TEMP/gotip"

      - name: Tests, pure Go
        run: $RUNNER_TEMP/gotip/bin/go test ./...

      - name: Tests, SIMD
        run: $RUNNER_TEMP/gotip/bin/go test ./...
        env:
          GOEXPERIMENT: simd

      - name: Go stdlib high-level corpus
        run: ./scripts/check-stdlib-corpus.sh "$RUNNER_TEMP/gotip/bin/go"

      - name: Vet
        run: $RUNNER_TEMP/gotip/bin/go vet -unsafeptr=false ./...

      - name: Race
        run: $RUNNER_TEMP/gotip/bin/go test -race -skip 'Allocs|StaysOnStack|TestParseFloat64' ./...
        env:
          GOEXPERIMENT: simd

      - name: Checkptr
        run: >-
          "$RUNNER_TEMP/gotip/bin/go" test
          -gcflags=all=-d=checkptr=2
          -skip 'Allocs|StaysOnStack|TestParseFloat64' ./...
        env:
          GOEXPERIMENT: simd

      - name: Cross-compile other Linux architecture
        run: $RUNNER_TEMP/gotip/bin/go build ./...
        env:
          GOOS: linux
          GOARCH: ${{ matrix.cross_arch }}
          GOEXPERIMENT: simd

      - name: Fuzz smoke
        if: ${{ matrix.primary }}
        run: |
          $RUNNER_TEMP/gotip/bin/go test -run='^$' -fuzz='^FuzzTypedDecoderMatchesStdlib$' -fuzztime=60s .
          $RUNNER_TEMP/gotip/bin/go test -run='^$' -fuzz='^FuzzEncoderMatchesStdlib$' -fuzztime=60s .
        env:
          GOEXPERIMENT: simd

      - name: Comparison module builds
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go test -run 'TestValidatorsAcceptFixtures' .
        working-directory: benchmarks
