name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  stable:
    name: stable portable (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            primary: true
          - runner: ubuntu-24.04-arm
            primary: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.4
          cache: false

      - name: Tests, portable
        run: go test ./...

      - name: FileStore 100x resident-pressure gate
        if: ${{ matrix.primary && github.event_name == 'schedule' }}
        run: >-
          go test . -run '^TestFileStoreHundredXResidentSmoke$'
          -v -count=1
        env:
          GOMEMLIMIT: 128MiB
          SIMDJSON_FILESTORE_100X: 1

      - name: Experiment flag retains portable fallback
        run: go test -tags=simdjson_future_compiler_test ./...
        env:
          GOEXPERIMENT: simd

      - name: Generated files reproduce on stable Go
        if: ${{ matrix.primary }}
        run: |
          go generate ./...
          git diff --exit-code

      - name: Vet
        if: ${{ matrix.primary }}
        run: go vet ./...

  toolchain:
    name: toolchain (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip

  test:
    name: test (${{ matrix.runner }})
    needs: toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            cross_arch: arm64
            primary: true
          - runner: ubuntu-24.04-arm
            cross_arch: amd64
            primary: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      # Keep command selection explicit; this job validates the pinned
      # development compiler rather than auto-downloading another toolchain.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip

      - name: Tests, pure Go
        run: $RUNNER_TEMP/gotip/bin/go test ./...

      - name: Tests, SIMD
        run: $RUNNER_TEMP/gotip/bin/go test ./...
        env:
          GOEXPERIMENT: simd

      - name: Tests, SIMD with direct amd64 v3 dispatch
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go test ./...
        env:
          GOAMD64: v3
          GOEXPERIMENT: simd

      - name: Verify amd64 Stage 1 ISA policy
        if: ${{ matrix.primary }}
        run: ./scripts/check-amd64-stage1-isa.sh "$RUNNER_TEMP/gotip/bin/go"

      - name: Verify amd64 bitmap ISA policy
        if: ${{ matrix.primary }}
        run: ./scripts/check-amd64-bitset-isa.sh "$RUNNER_TEMP/gotip/bin/go"

      - name: Future compiler tag retains portable SIMD fallback
        run: >-
          $RUNNER_TEMP/gotip/bin/go test
          -tags='go1.28 simdjson_future_compiler_test' ./...
        env:
          GOEXPERIMENT: simd

      - name: Tests, shuffled
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go test -short -shuffle=on ./...

      - name: Go stdlib high-level corpus
        run: ./scripts/check-stdlib-corpus.sh "$RUNNER_TEMP/gotip/bin/go"

      - name: Vet
        run: $RUNNER_TEMP/gotip/bin/go vet ./...

      - name: Install pinned analysis tools
        if: ${{ matrix.primary }}
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" $RUNNER_TEMP/gotip/bin/go install honnef.co/go/tools/cmd/staticcheck@v0.8.0-rc.1
          GOBIN="$RUNNER_TEMP/bin" $RUNNER_TEMP/gotip/bin/go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Static analysis
        if: ${{ matrix.primary }}
        run: >-
          PATH="$RUNNER_TEMP/gotip/bin:$PATH"
          "$RUNNER_TEMP/bin/staticcheck"
          '-checks=SA*' ./...

      - name: Vulnerability scan
        if: ${{ matrix.primary }}
        run: >-
          PATH="$RUNNER_TEMP/gotip/bin:$PATH"
          "$RUNNER_TEMP/bin/govulncheck" ./...

      - name: Generated files are clean
        if: ${{ matrix.primary }}
        run: |
          $RUNNER_TEMP/gotip/bin/go generate ./...
          git diff --exit-code

      - name: Unsafe inventory is complete
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go run ./internal/cmd/unsafeinventory -check UNSAFE.md

      - name: Store checksum ISA and allocation guard
        if: ${{ matrix.primary }}
        run: ./scripts/check-storeio-checksum-isa.sh "$RUNNER_TEMP/gotip/bin/go"

      - name: Test contracts and fuzz corpus are current
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go run ./internal/cmd/testcontracts -check

      - name: Module files are tidy
        if: ${{ matrix.primary }}
        run: |
          $RUNNER_TEMP/gotip/bin/go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Lifetime stress
        run: >-
          "$RUNNER_TEMP/gotip/bin/go" test
          -run '^Test(EncoderScratchPoolPoisoning|DynamicMapScratchIsPlanIndependent|EncodeHookArrayUsesStableSourcePointers|HookReceiverLifetimes|HookRetentionTrapAfterPanic)$'
          -count=10 -cpu=1,4,8 .
        env:
          GOGC: 1
          GOEXPERIMENT: simd

      - name: Cross-compile other Linux architecture
        run: $RUNNER_TEMP/gotip/bin/go build ./...
        env:
          GOOS: linux
          GOARCH: ${{ matrix.cross_arch }}
          GOEXPERIMENT: simd

      - name: Cross-compile 32-bit and big-endian targets
        if: ${{ matrix.primary }}
        run: |
          GOARCH=386 $RUNNER_TEMP/gotip/bin/go build ./...
          GOARCH=s390x $RUNNER_TEMP/gotip/bin/go build ./...

      - name: Comparison module builds
        if: ${{ matrix.primary }}
        run: $RUNNER_TEMP/gotip/bin/go test -run 'TestValidatorsAcceptFixtures|TestStage2MachineCorpora' .
        working-directory: benchmarks

      - name: Stable comparison module builds
        if: ${{ matrix.primary }}
        run: go test ./...
        working-directory: benchmarks/legacy

  race:
    name: race (${{ matrix.configuration.name }})
    needs: toolchain
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - name: pure-amd64
            runner: ubuntu-latest
            experiment: ''
          - name: simd-amd64
            runner: ubuntu-latest
            experiment: simd
          - name: simd-arm64
            runner: ubuntu-24.04-arm
            experiment: simd
    runs-on: ${{ matrix.configuration.runner }}
    timeout-minutes: 25
    env:
      GOTOOLCHAIN: local
      GOEXPERIMENT: ${{ matrix.configuration.experiment }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip
      - name: Race
        # Full high-volume differentials run in both backend/architecture test
        # jobs; the short profile keeps representative detector coverage.
        run: >-
          "$RUNNER_TEMP/gotip/bin/go" test
          -short -race -timeout=20m
          -skip 'Alloc|ZeroCost|StaysOnStack'
          ./...

  checkptr:
    name: checkptr (${{ matrix.runner }})
    needs: toolchain
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: local
      GOEXPERIMENT: simd
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip
      - name: Checkptr
        # Pointer instrumentation needs every contract path, not millions of
        # duplicate random samples already covered by the full test jobs.
        run: >-
          "$RUNNER_TEMP/gotip/bin/go" test
          -short
          -gcflags=all=-d=checkptr=2
          -skip 'Alloc|ZeroCost|StaysOnStack' ./...

  fuzz:
    name: fuzz (${{ matrix.runner }}, ${{ matrix.fuzz_shard }}/2)
    needs: toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            fuzz_shard: 0
          - runner: ubuntu-24.04-arm
            fuzz_shard: 1
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: local
      GOEXPERIMENT: simd
      GOFLAGS: -tags=simdjson_validate_hooks
      FUZZ_PARALLEL: 4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip
      - name: Fuzz smoke, all targets
        # An execution budget is deterministic across runner speeds and avoids
        # wall-clock shutdown races. Scheduled fuzzing below remains duration-
        # based for depth.
        run: ./scripts/fuzz-smoke.sh "$RUNNER_TEMP/gotip/bin/go" 1000x "${{ matrix.fuzz_shard }}" 2
      - name: Upload fuzz crash corpus
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.runner }}-${{ matrix.fuzz_shard }}
          path: '**/testdata/fuzz/**'
          if-no-files-found: ignore

  scheduled-fuzz:
    name: scheduled fuzz (${{ matrix.runner }}, ${{ matrix.fuzz_shard }}/2)
    if: ${{ github.event_name == 'schedule' }}
    needs: toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            fuzz_shard: 0
          - runner: ubuntu-24.04-arm
            fuzz_shard: 1
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: local
      FUZZ_PARALLEL: 4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip
      - name: Scheduled fuzz, pure Go
        run: ./scripts/fuzz-smoke.sh "$RUNNER_TEMP/gotip/bin/go" 30s "${{ matrix.fuzz_shard }}" 2
      - name: Upload fuzz crash corpus
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scheduled-fuzz-crash-${{ matrix.runner }}-${{ matrix.fuzz_shard }}
          path: '**/testdata/fuzz/**'
          if-no-files-found: ignore
