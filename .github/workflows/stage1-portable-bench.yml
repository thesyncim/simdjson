name: stage1 portable kernel bench

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build pinned Go tip
        shell: bash
        run: ./scripts/bootstrap-gotip.sh "$RUNNER_TEMP/simdjson-gotip"
      - name: Toolchain and CPU
        shell: bash
        run: |
          "$RUNNER_TEMP/simdjson-gotip/bin/go" version
          uname -a
          if command -v sysctl >/dev/null 2>&1; then sysctl -n machdep.cpu.brand_string 2>/dev/null || true; fi
          if command -v lscpu >/dev/null 2>&1; then lscpu | sed -n '1,20p'; fi
      - name: Candidate correctness
        shell: bash
        run: "$RUNNER_TEMP/simdjson-gotip/bin/go" test ./simd -run '^TestStage1PortableCandidates$' -count=1
      - name: Portable kernel benchmarks
        shell: bash
        run: |
          "$RUNNER_TEMP/simdjson-gotip/bin/go" test ./simd \
            -run '^$' \
            -bench '^BenchmarkStage1(Escaped|Rec)Portable$' \
            -benchtime=1s -count=12 -cpu=1
