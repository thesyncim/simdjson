name: stage1 portable kernel bench

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage1-portable-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: portable-source
          path: |
            .
            !.git
          include-hidden-files: true
      - name: Build pinned Go tip
        shell: bash
        run: ./scripts/bootstrap-gotip.sh "$RUNNER_TEMP/simdjson-gotip"
      - name: Toolchain and CPU
        shell: bash
        run: |
          "$RUNNER_TEMP/simdjson-gotip/bin/go" version
          uname -a
          lscpu | sed -n '1,20p'
      - name: Portable correctness
        shell: bash
        run: |
          set -o pipefail
          "$RUNNER_TEMP/simdjson-gotip/bin/go" test ./simd -count=1 -v \
            2>&1 | tee "$RUNNER_TEMP/simd-tests-${RUNNER_ARCH}.txt"
      - name: Portable kernel benchmarks
        shell: bash
        run: |
          set -o pipefail
          "$RUNNER_TEMP/simdjson-gotip/bin/go" test ./simd \
            -run '^$' \
            -bench '^Benchmark(Stage1(BlockPortable|EscapedPortable|PrefixXORPortable|RecPortable)|Parse16Digits)$' \
            -benchtime=750ms -count=8 -cpu=1 \
            2>&1 | tee "$RUNNER_TEMP/portable-kernels-${RUNNER_ARCH}.txt"
      - name: SIMD digit selection benchmark
        shell: bash
        env:
          GOEXPERIMENT: simd
        run: |
          set -o pipefail
          "$RUNNER_TEMP/simdjson-gotip/bin/go" test ./simd \
            -run '^$' -bench '^BenchmarkParse16Digits$' \
            -benchtime=750ms -count=8 -cpu=1 \
            2>&1 | tee "$RUNNER_TEMP/simd-digits-${RUNNER_ARCH}.txt"
      - name: Portable end-to-end benchmarks
        shell: bash
        run: |
          set -o pipefail
          "$RUNNER_TEMP/simdjson-gotip/bin/go" test . \
            -run '^$' -bench '^BenchmarkPortableBackend(Valid|BuildIndex)$' \
            -benchtime=1s -count=8 -cpu=1 \
            2>&1 | tee "$RUNNER_TEMP/portable-end-to-end-${RUNNER_ARCH}.txt"
      - name: Upload output
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: portable-debug-ubuntu
          path: ${{ runner.temp }}/*.txt
          if-no-files-found: warn
