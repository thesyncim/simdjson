name: apply zero-check dispatch

on:
  push:
    branches: [perf/stage1-portable-kernel]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: perf/stage1-portable-kernel
          fetch-depth: 0
      - name: Bind scanner kernels once
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("simd/scan_simd_amd64.go")
          source = path.read_text()
          start = source.index("// scanAMD64Level selects the vector width once at startup.")
          end = source.index("func validUTF8NoLineSeparatorRuntime")
          replacement = r'''// Scanner implementations are selected once during package initialization.
          // Hot calls contain no CPU capability branch; they call the function already
          // bound for this process.
          var (
          	scanStringSpecialSelected      = scanStringSpecialScalar
          	scanStringSyntaxSelected       = scanStringSyntaxScalar
          	scanEncodedHTMLSpecialSelected = scanEncodedHTMLSpecialScalar
          	scanEncodedHTMLSyntaxSelected  = scanEncodedHTMLSyntaxScalar
          )

          func initStringScanner() {
          	// AVX2 is the demonstrated production width, including on AVX-512
          	// capable CPUs. Capability checks happen only here; hot calls invoke
          	// the selected implementation directly.
          	scanCPUFeatures = detectX86CPUFeatures()
          	if scanCPUFeatures.Has(CPUFeatureAVX2) {
          		scanStringSpecialSelected = scanStringSpecialAVX2
          		scanStringSyntaxSelected = scanStringSyntaxAVX2
          		scanEncodedHTMLSpecialSelected = scanEncodedHTMLSpecialAVX2
          		scanEncodedHTMLSyntaxSelected = scanEncodedHTMLSyntaxAVX2
          		scanStringSelectedMinBytes = 32
          		scanStringProbeMinBytes = 40
          		scanStringSpecialBackend = "amd64-avx2"
          		scanStringVectorBytes = 32
          	}
          }

          func scanStringSpecialRuntime(src []byte, i int) int {
          	return scanStringSpecialSelected(noescapeBytes(src), i)
          }

          func scanStringSyntaxRuntime(src []byte, i int) int {
          	return scanStringSyntaxSelected(noescapeBytes(src), i)
          }

          func scanEncodedHTMLSpecialRuntime(src []byte, i int) int {
          	return scanEncodedHTMLSpecialSelected(noescapeBytes(src), i)
          }

          func scanEncodedHTMLSyntaxRuntime(src []byte, i int) int {
          	return scanEncodedHTMLSyntaxSelected(noescapeBytes(src), i)
          }

          '''
          path.write_text(source[:start] + replacement + source[end:])

          Path("simd/noescape_amd64.go").write_text(r'''//go:build goexperiment.simd && amd64

          package simd

          // noescapeBytes returns the same slice while hiding the alias from escape
          // analysis. The assembly body copies only the slice header; the backing
          // store remains owned and kept alive by the caller. This keeps stack-backed
          // scanner input from escaping through the selected function value.
          //
          //go:noescape
          func noescapeBytes(src []byte) []byte
          ''')

          Path("simd/noescape_amd64.s").write_text(r'''//go:build goexperiment.simd && amd64

          #include "textflag.h"

          // noescapeBytes copies a slice header unchanged.
          TEXT ·noescapeBytes(SB), NOSPLIT, $0-48
          	MOVQ src_base+0(FP), AX
          	MOVQ src_len+8(FP), BX
          	MOVQ src_cap+16(FP), CX
          	MOVQ AX, ret_base+24(FP)
          	MOVQ BX, ret_len+32(FP)
          	MOVQ CX, ret_cap+40(FP)
          	RET
          ''')
          PY
          gofmt -w simd/scan_simd_amd64.go simd/noescape_amd64.go
          rm .github/workflows/apply-zero-check-dispatch.yml
      - name: Commit
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add simd/scan_simd_amd64.go simd/noescape_amd64.go simd/noescape_amd64.s .github/workflows/apply-zero-check-dispatch.yml
          git commit -m "perf: bind amd64 scanner kernels once"
          git push origin HEAD:perf/stage1-portable-kernel
