name: performance

# Validation-only hosted proof for the ARM64 scanner crossover. This workflow
# commit must not be merged: publication gates remain on dedicated runners.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  direct-interleaved-gates:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      GOTOOLCHAIN: local
      BASELINE: e57e82451965a0b7c579c308b366635c2fe7f9cb
      BENCH_B_PER_OP_REGRESSION_LIMIT: 0.01
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip
          cache-scope: crossover-validation-${{ runner.arch }}

      - name: Install pinned benchstat
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" "$RUNNER_TEMP/gotip/bin/go" install golang.org/x/perf/cmd/benchstat@v0.0.0-20260610192853-712aea8b4705

      - name: High-level corpus gate
        run: >-
          ./scripts/bench-gate.sh
          -b "$BASELINE" -n 12 -t 500ms -r 2
        env:
          GOTIP: ${{ runner.temp }}/gotip/bin/go
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat

      - name: Scanner kernel gate
        run: >-
          ./scripts/bench-gate.sh -d simd
          -b "$BASELINE" -n 12 -t 500ms -r 2
          '^BenchmarkScanner(Backend|StopPosition)$'
        env:
          GOTIP: ${{ runner.temp }}/gotip/bin/go
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat

      - name: Root scanner-path gate
        run: >-
          ./scripts/bench-gate.sh -d .
          -b "$BASELINE" -n 12 -t 500ms -r 2
          '^Benchmark(BuildIndex|Decode|Valid|PortableBackend)'
        env:
          GOTIP: ${{ runner.temp }}/gotip/bin/go
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat
