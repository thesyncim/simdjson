name: performance

# Manual until a matching dedicated runner is registered. Hosted runners are
# intentionally used only for directional backend comparisons, not hard gates.
on:
  workflow_dispatch:
    inputs:
      baseline:
        description: Git ref to compare against
        required: true

permissions:
  contents: read

concurrency:
  group: performance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-contracts:
    # This label is intentionally dedicated: shared hosted runners are too
    # noisy to make a statistically significant regression gate authoritative.
    runs-on: [self-hosted, linux, arm64, simdjson-performance]
    timeout-minutes: 90
    env:
      GOTOOLCHAIN: local
      BASELINE: ${{ inputs.baseline }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up stable Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.4
          cache: false

      - name: Capture stable Go
        shell: bash
        run: |
          stable_go=$(command -v go)
          "$stable_go" version
          printf 'STABLE_GO=%s\n' "$stable_go" >> "$GITHUB_ENV"

      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip
          cache-scope: performance

      - name: Install benchstat with stable Go
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" "$STABLE_GO" install golang.org/x/perf/cmd/benchstat@v0.0.0-20260610192853-712aea8b4705

      - name: Stable Go portable high-level corpus gate
        run: >-
          BENCH_GO="$STABLE_GO" BENCH_GOEXPERIMENT=
          ./scripts/bench-gate.sh
          -b "$BASELINE" -c 63 -n 12 -t 500ms -r 2
        env:
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat

      - name: Stable Go portable resource-after-spike gate
        run: >-
          BENCH_GO="$STABLE_GO" BENCH_GOEXPERIMENT=
          ./scripts/bench-gate.sh -d .
          -b "$BASELINE" -c 3 -n 12 -t 500ms -r 2
          '^Benchmark(EncodeTinyAfterHuge|StructuralTapeTinyAfterHuge|MarshalSmall)$'
        env:
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat

      - name: Stable Go portable hook end-to-end gate
        run: >-
          BENCH_GO="$STABLE_GO" BENCH_GOEXPERIMENT=
          ./scripts/bench-gate.sh -d .
          -b "$BASELINE" -c 5 -n 12 -t 500ms -r 2
          '^Benchmark(HookDecodeLarge|HookEncodeLarge|HookDecodeUnknownField)$'
        env:
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat

      - name: Pinned Go 1.27 SIMD high-level corpus gate
        run: >-
          BENCH_GO="$RUNNER_TEMP/gotip/bin/go" BENCH_GOEXPERIMENT=simd
          ./scripts/bench-gate.sh
          -b "$BASELINE" -c 63 -n 12 -t 500ms -r 2
        env:
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat

      - name: Pinned Go 1.27 SIMD resource-after-spike gate
        run: >-
          BENCH_GO="$RUNNER_TEMP/gotip/bin/go" BENCH_GOEXPERIMENT=simd
          ./scripts/bench-gate.sh -d .
          -b "$BASELINE" -c 4 -n 12 -t 500ms -r 2
          '^Benchmark(EncodeTinyAfterHuge|StructuralTapeTinyAfterHuge|MarshalSmall)$'
        env:
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat

      - name: Pinned Go 1.27 SIMD hook end-to-end gate
        run: >-
          BENCH_GO="$RUNNER_TEMP/gotip/bin/go" BENCH_GOEXPERIMENT=simd
          ./scripts/bench-gate.sh -d .
          -b "$BASELINE" -c 5 -n 12 -t 500ms -r 2
          '^Benchmark(HookDecodeLarge|HookEncodeLarge|HookDecodeUnknownField)$'
        env:
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat
