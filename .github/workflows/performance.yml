name: validation only - amd64 v3 direct dispatch

# Disposable validation wiring for codex/amd64-v3-direct-validation.
# Do not merge this workflow into main.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: amd64-v3-direct-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  amd64-v3-direct-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GOTOOLCHAIN: local
      GOAMD64: v3
      BASELINE: 8d0f7838de75c07368e9a8232e2cf9489a4d36ec
      BENCH_B_PER_OP_REGRESSION_LIMIT: "0.01"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up pinned Go tip
        uses: ./.github/actions/setup-gotip
        with:
          destination: ${{ runner.temp }}/gotip
          cache-scope: amd64-v3-direct-validation

      - name: Install pinned benchstat
        env:
          GOTIP: ${{ runner.temp }}/gotip/bin/go
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" "$GOTIP" install golang.org/x/perf/cmd/benchstat@v0.0.0-20260610192853-712aea8b4705

      - name: Scanner backend string gate
        continue-on-error: true
        env:
          GOTIP: ${{ runner.temp }}/gotip/bin/go
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat
          TMPDIR: ${{ runner.temp }}/scanner-backend
        run: >-
          ./scripts/bench-gate.sh -d simd
          -b "$BASELINE" -n 12 -t 500ms -r 2
          '^BenchmarkScannerBackend/string/(ascii|quote-end)/(32|55|56|64|128|512|4096)$'

      - name: Selected stop-position gate
        continue-on-error: true
        env:
          GOTIP: ${{ runner.temp }}/gotip/bin/go
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat
          TMPDIR: ${{ runner.temp }}/stop-position
        run: >-
          ./scripts/bench-gate.sh -d simd
          -b "$BASELINE" -n 12 -t 500ms -r 2
          '^BenchmarkScannerStopPosition/.*/selected$'

      - name: High-level valid and index gate
        continue-on-error: true
        env:
          GOTIP: ${{ runner.temp }}/gotip/bin/go
          BENCHSTAT: ${{ runner.temp }}/bin/benchstat
          TMPDIR: ${{ runner.temp }}/high-level
        run: >-
          ./scripts/bench-gate.sh -d tests/stdlib
          -b "$BASELINE" -n 12 -t 500ms -r 2
          '^BenchmarkHighLevelCorpus/.*/(valid|index)/simdjson$'

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: amd64-v3-direct-validation-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/scanner-backend/simdjson-bench-gate-*/old.txt
            ${{ runner.temp }}/scanner-backend/simdjson-bench-gate-*/new.txt
            ${{ runner.temp }}/stop-position/simdjson-bench-gate-*/old.txt
            ${{ runner.temp }}/stop-position/simdjson-bench-gate-*/new.txt
            ${{ runner.temp }}/high-level/simdjson-bench-gate-*/old.txt
            ${{ runner.temp }}/high-level/simdjson-bench-gate-*/new.txt
          if-no-files-found: warn
          retention-days: 7
