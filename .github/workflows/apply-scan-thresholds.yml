name: apply scanner thresholds

on:
  push:
    branches: [perf/zero-runtime-dispatch]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: perf/zero-runtime-dispatch
          fetch-depth: 0
      - name: Tune scanner crossover
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          generic = Path("simd/scan_simd.go")
          source = generic.read_text()
          source = source.replace(
              "\tscanStringProbeMinBytes    = int(^uint(0) >> 1)\n\tscanStringVectorBytes      int\n",
              "\tscanStringProbeMinBytes    = int(^uint(0) >> 1)\n\tscanStringProbeBytes       = 16\n\tscanStringVectorBytes      int\n\tscanEncodedHTMLMinBytes    = 16\n",
              1,
          )
          source = source.replace(
              "// scanEncodedHTMLMinBytes gates the HTML scanners straight into the vector\n// kernels at one full block. They have no SWAR probe stage: each word mask\n// must test three extra characters, roughly doubling its cost.\nconst scanEncodedHTMLMinBytes = 16\n",
              "// scanEncodedHTMLMinBytes gates the HTML scanners into the selected backend.\n// It stays low on ARM64, where NEON wins immediately, and is raised on amd64\n// to amortize the init-selected assembly tail trampoline.\n",
              1,
          )
          special_anchor = """\t\tif m := stringSpecialMask(binary.LittleEndian.Uint64(src[i:])); m != 0 {\n\t\t\treturn i + bits.TrailingZeros64(m)/8\n\t\t}\n\t\ti += 8\n\t}\n\tif len(src)-i >= scanStringSelectedMinBytes {\n"""
          special_replacement = """\t\tif m := stringSpecialMask(binary.LittleEndian.Uint64(src[i:])); m != 0 {\n\t\t\treturn i + bits.TrailingZeros64(m)/8\n\t\t}\n\t\ti += 8\n\t\tfor i-start < scanStringProbeBytes && i+8 <= len(src) {\n\t\t\tif m := stringSpecialMask(binary.LittleEndian.Uint64(src[i:])); m != 0 {\n\t\t\t\treturn i + bits.TrailingZeros64(m)/8\n\t\t\t}\n\t\t\ti += 8\n\t\t}\n\t}\n\tif len(src)-i >= scanStringSelectedMinBytes {\n"""
          if special_anchor not in source:
              raise SystemExit("special probe anchor not found")
          source = source.replace(special_anchor, special_replacement, 1)

          syntax_anchor = """\t\tif m := stringSyntaxMask(binary.LittleEndian.Uint64(src[i:])); m != 0 {\n\t\t\treturn i + bits.TrailingZeros64(m)/8\n\t\t}\n\t\ti += 8\n\t}\n\tif len(src)-i >= scanStringSelectedMinBytes {\n"""
          syntax_replacement = """\t\tif m := stringSyntaxMask(binary.LittleEndian.Uint64(src[i:])); m != 0 {\n\t\t\treturn i + bits.TrailingZeros64(m)/8\n\t\t}\n\t\ti += 8\n\t\tfor i-start < scanStringProbeBytes && i+8 <= len(src) {\n\t\t\tif m := stringSyntaxMask(binary.LittleEndian.Uint64(src[i:])); m != 0 {\n\t\t\t\treturn i + bits.TrailingZeros64(m)/8\n\t\t\t}\n\t\t\ti += 8\n\t\t}\n\t}\n\tif len(src)-i >= scanStringSelectedMinBytes {\n"""
          if syntax_anchor not in source:
              raise SystemExit("syntax probe anchor not found")
          source = source.replace(syntax_anchor, syntax_replacement, 1)
          generic.write_text(source)

          amd = Path("simd/scan_simd_amd64.go")
          source = amd.read_text()
          source = source.replace(
              "\tscanCPUFeatures = detectX86CPUFeatures()\n\tif useAVX2Scanner(scanCPUFeatures) {\n",
              "\tscanCPUFeatures = detectX86CPUFeatures()\n\tscanEncodedHTMLMinBytes = int(^uint(0) >> 1)\n\tif useAVX2Scanner(scanCPUFeatures) {\n",
              1,
          )
          source = source.replace(
              "\t\tscanStringSelectedMinBytes = 32\n\t\tscanStringProbeMinBytes = 40\n",
              "\t\tscanStringSelectedMinBytes = 512\n\t\tscanStringProbeMinBytes = 40\n\t\tscanStringProbeBytes = 128\n\t\tscanEncodedHTMLMinBytes = 512\n",
              1,
          )
          amd.write_text(source)
          PY
          gofmt -w simd/scan_simd.go simd/scan_simd_amd64.go
          rm .github/workflows/apply-scan-thresholds.yml
      - name: Commit
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add simd/scan_simd.go simd/scan_simd_amd64.go .github/workflows/apply-scan-thresholds.yml
          git commit -m "perf: amortize amd64 scanner tail dispatch"
          git push origin HEAD:perf/zero-runtime-dispatch
