<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="862" viewBox="0 0 1000 862" role="img" aria-labelledby="title desc"><title id="title">C++ and Go parse plus semantic digest</title><desc id="desc">Absolute completion time for matched semantic digests in C++ simdjson, portable Go, and SIMD Go. Every corpus has its own scale; lower is faster. Data (C++/Go portable/Go SIMD): Canada 355 µs/345 µs/342 µs, digest 99bfa841; CITM 989 µs/1.70 ms/1.06 ms, digest aa5480c8; Go source 3.21 ms/3.44 ms/3.39 ms, digest 143678d9; Escaped 68.5 µs/47.0 µs/39.5 µs, digest ceb1fff9; Unicode 22.1 µs/28.6 µs/22.0 µs, digest ceb1fff9; Synthea 1.80 ms/2.91 ms/2.05 ms, digest 3d3241a5; Twitter 669 µs/1.03 ms/747 µs, digest 7fd8ebd3. Source: benchmarks/results/latest.json. Snapshot 709613c6 · Apple M4 Max · darwin/arm64 · median of 6 calibrated samples (≥250ms each) · Go 03845e30; C++ simdjson 4.6.4 at 1bcf71bd85059ab6574ea1159de9298dcc1212c5.</desc><style>
