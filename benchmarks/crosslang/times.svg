<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="862" viewBox="0 0 1000 862" role="img" aria-labelledby="title desc"><title id="title">C++ and Go parse plus semantic digest</title><desc id="desc">Absolute completion time for matched semantic digests in C++ simdjson, portable Go, and SIMD Go. Every corpus has its own scale; lower is faster. Data (C++/Go portable/Go SIMD): Canada 357 µs/348 µs/342 µs, digest 99bfa841; CITM 987 µs/1.72 ms/1.07 ms, digest aa5480c8; Go source 3.24 ms/3.49 ms/3.44 ms, digest 143678d9; Escaped 68.7 µs/47.5 µs/40.0 µs, digest ceb1fff9; Unicode 22.4 µs/29.2 µs/22.8 µs, digest ceb1fff9; Synthea 1.83 ms/2.95 ms/2.04 ms, digest 3d3241a5; Twitter 679 µs/1.05 ms/744 µs, digest 7fd8ebd3. Source: benchmarks/results/latest.json. Snapshot 63eb4d72 · Apple M4 Max · darwin/arm64 · median of 6 calibrated samples (≥250ms each) · Go 03845e30; C++ simdjson 4.6.4 at 1bcf71bd85059ab6574ea1159de9298dcc1212c5.</desc><style>
