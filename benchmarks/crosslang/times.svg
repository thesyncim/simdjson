<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="862" viewBox="0 0 1000 862" role="img" aria-labelledby="title desc"><title id="title">C++ and Go parse plus semantic digest</title><desc id="desc">Absolute completion time for matched semantic digests in C++ simdjson, portable Go, and SIMD Go. Every corpus has its own scale; lower is faster. Data (C++/Go portable/Go SIMD): Canada 367 µs/347 µs/343 µs, digest 99bfa841; CITM 1.00 ms/1.75 ms/1.08 ms, digest aa5480c8; Go source 3.29 ms/3.48 ms/3.47 ms, digest 143678d9; Escaped 69.1 µs/47.8 µs/40.0 µs, digest ceb1fff9; Unicode 22.5 µs/29.7 µs/22.3 µs, digest ceb1fff9; Synthea 1.87 ms/2.99 ms/2.07 ms, digest 3d3241a5; Twitter 681 µs/1.06 ms/743 µs, digest 7fd8ebd3. Source: benchmarks/results/latest.json. Snapshot 63385135 · Apple M4 Max · darwin/arm64 · median of 6 calibrated samples (≥250ms each) · Go 03845e30; C++ simdjson 4.6.4 at 1bcf71bd85059ab6574ea1159de9298dcc1212c5.</desc><style>
