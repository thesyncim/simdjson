<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1662" viewBox="0 0 1000 1662" role="img" aria-labelledby="title desc"><title id="title">Go library absolute time by measured operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Regular rows show portable and SIMD compiler modes. Data (operation=portable/SIMD absolute time): simdjson valid=183 µs/81.4 µs typed-reused=273 µs/239 µs dynamic-owned=607 µs/561 µs encode=270 µs/207 µs; encoding/json valid=258 µs/256 µs typed-reused=990 µs/979 µs dynamic-owned=2.10 ms/2.07 ms encode=465 µs/463 µs; go-json valid=1.99 ms/1.98 ms typed-reused=434 µs/434 µs dynamic-owned=1.11 ms/1.09 ms encode=298 µs/295 µs; Segment valid=280 µs/278 µs typed-reused=644 µs/642 µs dynamic-owned=2.97 ms/2.93 ms encode=274 µs/271 µs; jsoniter valid=458 µs/457 µs typed-reused=661 µs/663 µs dynamic-owned=1.27 ms/1.25 ms encode=558 µs/553 µs; fastjson valid=266 µs/260 µs typed-reused=not measured dynamic-owned=not measured encode=not measured; encoding/json/v2 valid=not measured typed-reused=785 µs/810 µs dynamic-owned=1.18 ms/1.18 ms encode=432 µs/451 µs; Sonic (Go 1.26) valid=115 µs stable typed-reused=396 µs stable dynamic-owned=653 µs stable encode=476 µs stable. Source: benchmarks/results/latest.json. Snapshot 709613c6 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
