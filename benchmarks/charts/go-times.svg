<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1662" viewBox="0 0 1000 1662" role="img" aria-labelledby="title desc"><title id="title">Go library absolute time by measured operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Regular rows show portable and SIMD compiler modes. Data (operation=portable/SIMD absolute time): simdjson valid=182 µs/82.9 µs typed-reused=250 µs/220 µs dynamic-owned=630 µs/571 µs encode=254 µs/195 µs; encoding/json valid=257 µs/260 µs typed-reused=989 µs/973 µs dynamic-owned=2.14 ms/2.12 ms encode=470 µs/471 µs; go-json valid=1.97 ms/2.01 ms typed-reused=442 µs/432 µs dynamic-owned=1.13 ms/1.10 ms encode=300 µs/299 µs; Segment valid=281 µs/282 µs typed-reused=646 µs/636 µs dynamic-owned=3.04 ms/2.96 ms encode=278 µs/277 µs; jsoniter valid=454 µs/466 µs typed-reused=667 µs/658 µs dynamic-owned=1.30 ms/1.26 ms encode=569 µs/567 µs; fastjson valid=262 µs/266 µs typed-reused=not measured dynamic-owned=not measured encode=not measured; encoding/json/v2 valid=not measured typed-reused=824 µs/813 µs dynamic-owned=1.19 ms/1.31 ms encode=474 µs/451 µs; Sonic (Go 1.26) valid=116 µs stable typed-reused=414 µs stable dynamic-owned=676 µs stable encode=500 µs stable. Source: benchmarks/results/latest.json. Snapshot 61ebec4e · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
