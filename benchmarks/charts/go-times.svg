<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1662" viewBox="0 0 1000 1662" role="img" aria-labelledby="title desc"><title id="title">Go library absolute time by measured operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Regular rows show portable and SIMD compiler modes. Data (operation=portable/SIMD absolute time): simdjson valid=185 µs/82.5 µs typed-reused=252 µs/225 µs dynamic-owned=639 µs/573 µs encode=258 µs/196 µs; encoding/json valid=260 µs/259 µs typed-reused=990 µs/989 µs dynamic-owned=2.19 ms/2.13 ms encode=479 µs/474 µs; go-json valid=2.04 ms/2.02 ms typed-reused=439 µs/440 µs dynamic-owned=1.14 ms/1.12 ms encode=306 µs/300 µs; Segment valid=284 µs/282 µs typed-reused=647 µs/651 µs dynamic-owned=3.05 ms/3.01 ms encode=279 µs/277 µs; jsoniter valid=465 µs/457 µs typed-reused=668 µs/672 µs dynamic-owned=1.31 ms/1.27 ms encode=572 µs/567 µs; fastjson valid=269 µs/267 µs typed-reused=not measured dynamic-owned=not measured encode=not measured; encoding/json/v2 valid=not measured typed-reused=849 µs/890 µs dynamic-owned=1.26 ms/1.65 ms encode=457 µs/455 µs; Sonic (Go 1.26) valid=116 µs stable typed-reused=410 µs stable dynamic-owned=697 µs stable encode=486 µs stable. Source: benchmarks/results/latest.json. Snapshot 63385135 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
