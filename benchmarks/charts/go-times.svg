<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1662" viewBox="0 0 1000 1662" role="img" aria-labelledby="title desc"><title id="title">Go library absolute time by measured operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Regular rows show portable and SIMD compiler modes. Data (operation=portable/SIMD absolute time): simdjson valid=182 µs/82.2 µs typed-reused=251 µs/222 µs dynamic-owned=620 µs/572 µs encode=257 µs/192 µs; encoding/json valid=258 µs/259 µs typed-reused=982 µs/990 µs dynamic-owned=2.17 ms/2.12 ms encode=476 µs/487 µs; go-json valid=1.98 ms/2.01 ms typed-reused=435 µs/434 µs dynamic-owned=1.12 ms/1.10 ms encode=299 µs/301 µs; Segment valid=281 µs/280 µs typed-reused=646 µs/649 µs dynamic-owned=3.02 ms/2.97 ms encode=279 µs/278 µs; jsoniter valid=457 µs/461 µs typed-reused=665 µs/664 µs dynamic-owned=1.28 ms/1.29 ms encode=562 µs/563 µs; fastjson valid=264 µs/267 µs typed-reused=not measured dynamic-owned=not measured encode=not measured; encoding/json/v2 valid=not measured typed-reused=800 µs/752 µs dynamic-owned=1.21 ms/1.17 ms encode=449 µs/422 µs; Sonic (Go 1.26) valid=112 µs stable typed-reused=388 µs stable dynamic-owned=640 µs stable encode=465 µs stable. Source: benchmarks/results/latest.json. Snapshot 4215c789 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
