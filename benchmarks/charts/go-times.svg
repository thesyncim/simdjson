<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1662" viewBox="0 0 1000 1662" role="img" aria-labelledby="title desc"><title id="title">Go library absolute time by measured operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Regular rows show portable and SIMD compiler modes. Data (operation=portable/SIMD absolute time): simdjson valid=180 µs/81.2 µs typed-reused=277 µs/246 µs dynamic-owned=622 µs/559 µs encode=266 µs/201 µs; encoding/json valid=253 µs/257 µs typed-reused=985 µs/972 µs dynamic-owned=2.12 ms/2.08 ms encode=461 µs/453 µs; go-json valid=1.96 ms/1.97 ms typed-reused=433 µs/425 µs dynamic-owned=1.12 ms/1.09 ms encode=294 µs/292 µs; Segment valid=279 µs/278 µs typed-reused=642 µs/634 µs dynamic-owned=3.03 ms/2.95 ms encode=270 µs/266 µs; jsoniter valid=452 µs/452 µs typed-reused=656 µs/659 µs dynamic-owned=1.27 ms/1.24 ms encode=558 µs/542 µs; fastjson valid=265 µs/263 µs typed-reused=not measured dynamic-owned=not measured encode=not measured; encoding/json/v2 valid=not measured typed-reused=782 µs/780 µs dynamic-owned=1.18 ms/1.18 ms encode=432 µs/432 µs; Sonic (Go 1.26) valid=114 µs stable typed-reused=398 µs stable dynamic-owned=661 µs stable encode=473 µs stable. Source: benchmarks/results/latest.json. Snapshot 8d6fed7c · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
