<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1662" viewBox="0 0 1000 1662" role="img" aria-labelledby="title desc"><title id="title">Go library absolute time by measured operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Regular rows show portable and SIMD compiler modes. Data (operation=portable/SIMD absolute time): simdjson valid=184 µs/82.5 µs typed-reused=250 µs/223 µs dynamic-owned=619 µs/578 µs encode=249 µs/189 µs; encoding/json valid=258 µs/258 µs typed-reused=986 µs/988 µs dynamic-owned=2.14 ms/2.13 ms encode=471 µs/472 µs; go-json valid=2.00 ms/2.00 ms typed-reused=439 µs/437 µs dynamic-owned=1.11 ms/1.12 ms encode=297 µs/298 µs; Segment valid=282 µs/282 µs typed-reused=643 µs/650 µs dynamic-owned=2.99 ms/2.99 ms encode=271 µs/275 µs; jsoniter valid=467 µs/458 µs typed-reused=663 µs/668 µs dynamic-owned=1.28 ms/1.27 ms encode=547 µs/560 µs; fastjson valid=265 µs/269 µs typed-reused=not measured dynamic-owned=not measured encode=not measured; encoding/json/v2 valid=not measured typed-reused=797 µs/794 µs dynamic-owned=1.18 ms/1.19 ms encode=447 µs/450 µs; Sonic (Go 1.26) valid=115 µs stable typed-reused=402 µs stable dynamic-owned=669 µs stable encode=479 µs stable. Source: benchmarks/results/latest.json. Snapshot 16504e83 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
