<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="416" viewBox="0 0 1000 416" role="img" aria-labelledby="title desc"><title id="title">Headline benchmark speedups</title><desc id="desc">Geometric mean speedups over encoding/json and the fastest compatible Go rival. One times is equal performance; larger values mean simdjson is faster.</desc><style>
