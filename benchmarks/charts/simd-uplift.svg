<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="428" viewBox="0 0 1000 428" role="img" aria-labelledby="title desc"><title id="title">SIMD uplift over portable Go</title><desc id="desc">Geometric mean portable-Go time divided by SIMD time, with the number of corpus wins labeled on every bar. One times is equal performance; larger values mean SIMD is faster.</desc><style>
svg { color-scheme: light dark; }
text { fill:#24292f; font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.heading { font-size:16px; font-weight:500; } .note { font-size:12px; }
.muted { fill:#57606a; } .grid { stroke:#d0d7de; stroke-width:1; }
.baseline { stroke:#8c959f; stroke-width:2; }
.s1 { fill:#0969da; } .s2 { fill:#8250df; } .s3 { fill:#1a7f37; }
.h1 { fill:#ddf4ff; } .h2 { fill:#b6e3ff; } .h3 { fill:#80ccff; } .h4 { fill:#54aeff; }
@media (prefers-color-scheme: dark) {
text { fill:#f0f6fc; } .muted { fill:#8c959f; } .grid { stroke:#30363d; } .baseline { stroke:#6e7681; }
.s1 { fill:#58a6ff; } .s2 { fill:#bc8cff; } .s3 { fill:#3fb950; }
.h1 { fill:#102c44; } .h2 { fill:#123c5a; } .h3 { fill:#15557a; } .h4 { fill:#1f6feb; }
}
</style><text class="heading" x="0" y="20">SIMD uplift over portable Go</text><text class="muted note" x="0" y="40">portable-Go time ÷ SIMD time · 1× is equal · higher is faster</text><line class="grid" x1="220.0" y1="70" x2="220.0" y2="408"/><text class="muted note" x="220.0" y="62" text-anchor="middle">0.0×</text><line class="grid" x1="375.0" y1="70" x2="375.0" y2="408"/><text class="muted note" x="375.0" y="62" text-anchor="middle">0.5×</text><line class="baseline" x1="530.0" y1="70" x2="530.0" y2="408"/><text class="muted note" x="530.0" y="62" text-anchor="middle">1× equal</text><line class="grid" x1="685.0" y1="70" x2="685.0" y2="408"/><text class="muted note" x="685.0" y="62" text-anchor="middle">1.5×</text><line class="grid" x1="840.0" y1="70" x2="840.0" y2="408"/><text class="muted note" x="840.0" y="62" text-anchor="middle">2.0×</text><text x="208" y="95" text-anchor="end">Validation</text><rect class="s1" x="220" y="81" width="559.0" height="18" rx="3"/><text x="786.0" y="95">1.803× · wins 6 of 7</text><text x="208" y="131" text-anchor="end">Dynamic owned</text><rect class="s1" x="220" y="117" width="329.6" height="18" rx="3"/><text x="556.6" y="131">1.063× · wins 4 of 7</text><text x="208" y="167" text-anchor="end">Dynamic zero-copy</text><rect class="s1" x="220" y="153" width="334.7" height="18" rx="3"/><text x="561.7" y="167">1.080× · wins 4 of 7</text><text x="208" y="203" text-anchor="end">Parse + complete walk</text><rect class="s1" x="220" y="189" width="379.0" height="18" rx="3"/><text x="606.0" y="203">1.222× · wins 6 of 7</text><text x="208" y="239" text-anchor="end">Typed owned</text><rect class="s1" x="220" y="225" width="338.5" height="18" rx="3"/><text x="565.5" y="239">1.092× · wins 4 of 7</text><text x="208" y="275" text-anchor="end">Typed zero-copy</text><rect class="s1" x="220" y="261" width="350.2" height="18" rx="3"/><text x="577.2" y="275">1.130× · wins 3 of 7</text><text x="208" y="311" text-anchor="end">Encode owned</text><rect class="s1" x="220" y="297" width="389.8" height="18" rx="3"/><text x="616.8" y="311">1.257× · wins 5 of 7</text><text x="208" y="347" text-anchor="end">Encode compiled reuse</text><rect class="s1" x="220" y="333" width="463.8" height="18" rx="3"/><text x="690.8" y="347">1.496× · wins 5 of 7</text><text x="208" y="383" text-anchor="end">Reusable structural index</text><rect class="s1" x="220" y="369" width="540.8" height="18" rx="3"/><text x="767.8" y="383">1.745× · wins 6 of 7</text></svg>