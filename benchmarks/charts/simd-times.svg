<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="972" viewBox="0 0 1000 972" role="img" aria-labelledby="title desc"><title id="title">Portable and SIMD absolute time by operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Data (portable/SIMD absolute time): Strict validation 184 µs/82.5 µs (7/7 SIMD wins); Dynamic owned decode 619 µs/578 µs (6/7 SIMD wins); Dynamic zero-copy 582 µs/537 µs (4/7 SIMD wins); Parse + complete walk 481 µs/347 µs (6/7 SIMD wins); Typed owned decode (reused dst) 250 µs/223 µs (7/7 SIMD wins); Typed zero-copy 200 µs/172 µs (7/7 SIMD wins); Owned encode 249 µs/189 µs (6/7 SIMD wins); Compiled encode reuse 159 µs/104 µs (6/7 SIMD wins); Reusable structural index 191 µs/88.9 µs (7/7 SIMD wins). Source: benchmarks/results/latest.json. Snapshot 16504e83 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
