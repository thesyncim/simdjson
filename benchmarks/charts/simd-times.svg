<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="972" viewBox="0 0 1000 972" role="img" aria-labelledby="title desc"><title id="title">Portable and SIMD absolute time by operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Data (portable/SIMD absolute time): Strict validation 182 µs/82.2 µs (6/7 SIMD wins); Dynamic owned decode 620 µs/572 µs (5/7 SIMD wins); Dynamic zero-copy 583 µs/536 µs (3/7 SIMD wins); Parse + complete walk 477 µs/344 µs (7/7 SIMD wins); Typed owned decode (reused dst) 251 µs/222 µs (6/7 SIMD wins); Typed zero-copy 199 µs/174 µs (4/7 SIMD wins); Owned encode 257 µs/192 µs (7/7 SIMD wins); Compiled encode reuse 159 µs/104 µs (6/7 SIMD wins); Reusable structural index 190 µs/88.8 µs (7/7 SIMD wins). Source: benchmarks/results/latest.json. Snapshot 4215c789 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
