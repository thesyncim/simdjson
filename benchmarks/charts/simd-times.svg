<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="972" viewBox="0 0 1000 972" role="img" aria-labelledby="title desc"><title id="title">Portable and SIMD absolute time by operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Data (portable/SIMD absolute time): Strict validation 182 µs/82.9 µs (6/7 SIMD wins); Dynamic owned decode 630 µs/571 µs (7/7 SIMD wins); Dynamic zero-copy 590 µs/530 µs (6/7 SIMD wins); Parse + complete walk 492 µs/334 µs (7/7 SIMD wins); Typed owned decode (reused dst) 250 µs/220 µs (7/7 SIMD wins); Typed zero-copy 201 µs/171 µs (7/7 SIMD wins); Owned encode 254 µs/195 µs (6/7 SIMD wins); Compiled encode reuse 160 µs/104 µs (6/7 SIMD wins); Reusable structural index 193 µs/91.9 µs (7/7 SIMD wins). Source: benchmarks/results/latest.json. Snapshot 61ebec4e · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
