<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="972" viewBox="0 0 1000 972" role="img" aria-labelledby="title desc"><title id="title">Portable and SIMD absolute time by operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Data (portable/SIMD absolute time): Strict validation 185 µs/82.5 µs (6/7 SIMD wins); Dynamic owned decode 639 µs/573 µs (7/7 SIMD wins); Dynamic zero-copy 599 µs/535 µs (7/7 SIMD wins); Parse + complete walk 481 µs/344 µs (6/7 SIMD wins); Typed owned decode (reused dst) 252 µs/225 µs (6/7 SIMD wins); Typed zero-copy 201 µs/173 µs (6/7 SIMD wins); Owned encode 258 µs/196 µs (7/7 SIMD wins); Compiled encode reuse 161 µs/104 µs (7/7 SIMD wins); Reusable structural index 190 µs/89.4 µs (7/7 SIMD wins). Source: benchmarks/results/latest.json. Snapshot 63385135 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
