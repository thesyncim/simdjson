<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="972" viewBox="0 0 1000 972" role="img" aria-labelledby="title desc"><title id="title">Portable and SIMD absolute time by operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Data (portable/SIMD absolute time): Strict validation 188 µs/84.8 µs (6/7 SIMD wins); Dynamic owned decode 649 µs/607 µs (6/7 SIMD wins); Dynamic zero-copy 608 µs/563 µs (5/7 SIMD wins); Parse + complete walk 522 µs/382 µs (6/7 SIMD wins); Typed owned decode (reused dst) 320 µs/292 µs (4/7 SIMD wins); Typed zero-copy 265 µs/232 µs (6/7 SIMD wins); Owned encode 275 µs/221 µs (6/7 SIMD wins); Compiled encode reuse 183 µs/125 µs (6/7 SIMD wins); Reusable structural index 194 µs/92.0 µs (7/7 SIMD wins). Source: benchmarks/results/latest.json. Snapshot 63eb4d72 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
