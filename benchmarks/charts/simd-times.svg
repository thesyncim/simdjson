<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="972" viewBox="0 0 1000 972" role="img" aria-labelledby="title desc"><title id="title">Portable and SIMD absolute time by operation</title><desc id="desc">Absolute geometric-mean time per operation over seven corpus files. Each operation has its own zero-based scale; lower is faster. Data (portable/SIMD absolute time): Strict validation 183 µs/81.4 µs (7/7 SIMD wins); Dynamic owned decode 607 µs/561 µs (5/7 SIMD wins); Dynamic zero-copy 572 µs/521 µs (7/7 SIMD wins); Parse + complete walk 475 µs/346 µs (6/7 SIMD wins); Typed owned decode (reused dst) 273 µs/239 µs (6/7 SIMD wins); Typed zero-copy 222 µs/189 µs (6/7 SIMD wins); Owned encode 270 µs/207 µs (7/7 SIMD wins); Compiled encode reuse 180 µs/118 µs (7/7 SIMD wins); Reusable structural index 190 µs/88.1 µs (7/7 SIMD wins). Source: benchmarks/results/latest.json. Snapshot 709613c6 · Apple M4 Max · darwin/arm64 · 6×300ms · Go 03845e30.</desc><style>
