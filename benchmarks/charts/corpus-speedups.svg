<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="408" viewBox="0 0 1000 408" role="img" aria-labelledby="title desc"><title id="title">Per-corpus speedup over encoding/json</title><desc id="desc">Every cell is the encoding/json time divided by the simdjson time for one operation and corpus. One times is equal performance; larger values mean simdjson is faster.</desc><style>
